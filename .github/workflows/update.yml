name: Update Movie Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon requests deep-translator
      - name: Run scanner
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python scanner.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'MovieBot'
          git config --global user.email 'bot@noreply.github.com'
          git add movies_data.json
          git commit -m "Update movie database" || exit 0
          git push
